# ── Frontend (bdranks.com) ────────────────────────────────────────────────────
server {
    listen 80;
    server_name bdranks.com www.bdranks.com;

    root /var/www/reviewhub/fe;
    index index.html;

    # SPA fallback — every path returns index.html so React Router handles it
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressively cache hashed static assets (Vite appends content hashes)
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}

# ── API (api.bdranks.com) ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.bdranks.com;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── CMS (cms.bdranks.com) ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name cms.bdranks.com;

    root /var/www/reviewhub/cms;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
